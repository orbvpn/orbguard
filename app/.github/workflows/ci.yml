name: CI

on:
  push:
    branches:
      - main
      - production-hardening
  pull_request:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # Pin to the Flutter version this project is developed against.
          flutter-version: 3.41.5
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Fail only on analyzer ERRORS. Infos/warnings (e.g. the pre-existing
      # dangling-doc-comment infos) must not break CI.
      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Test
        run: flutter test

      # API contract gate. tools/check_api_contract.py cross-checks the app's
      # endpoint calls against the orbguard.lab chi router. That backend repo
      # is NOT checked out in this standalone APP CI, so the step runs ONLY
      # when ../orbguard.lab is present (i.e. in a local/monorepo checkout
      # where both repos sit side by side). It is intentionally NOT faked in
      # CI — when the sibling repo is absent the step is skipped with a notice.
      - name: API contract gate (if backend repo present)
        run: |
          if [ -d "../orbguard.lab" ]; then
            python3 tools/check_api_contract.py --lab-root ../orbguard.lab
          else
            echo "::notice::orbguard.lab not checked out alongside this repo; skipping API contract gate (runs in the local/monorepo context)."
          fi
