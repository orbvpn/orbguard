name: orbguard
description: Anti-spyware defense system
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'
   
dependencies:
  flutter:
    sdk: flutter
     
  # Core dependencies
  permission_handler: ^12.0.1
  device_info_plus: ^12.1.0
  package_info_plus: ^9.0.0
  path_provider: ^2.1.1
  shared_preferences: ^2.3.4
     
  # Network & Security
  dio: ^5.4.0
  http: ^1.6.0
  connectivity_plus: ^7.0.0
  web_socket_channel: ^2.4.0
  crypto: ^3.0.3
     
  # Database
  sqflite: ^2.3.0
     
  # UI
  flutter_svg: ^2.0.9
  intl: ^0.20.2

  # Platform channels
  flutter_native_splash: ^2.3.5

  # Notifications
  flutter_local_notifications: ^18.0.1

  # State Management
  provider: ^6.1.1

  # QR Scanner
  mobile_scanner: ^7.2.0

  # File selection (forensic artifact uploads)
  file_picker: ^10.0.0

  # Device security / anti-theft agent
  geolocator: ^14.0.0
  workmanager: ^0.9.0
  camera: ^0.11.0
  audioplayers: ^6.1.0
  sim_card_info: ^1.0.2
  url_launcher: ^6.3.0
  # Biometric app-lock — failed unlock attempts trigger a thief selfie.
  # On iOS this is the platform-supported "best extent" for the selfie
  # feature (the OS lock screen exposes no failed-attempt hooks to apps).
  local_auth: ^2.3.0
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0
  firebase_crashlytics: ^5.2.6
  firebase_analytics: ^12.4.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

# App launcher icons across every platform, generated from the OrbGuard brand
# logo (assets/branding/). Regenerate with: dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/branding/icon_master.png"
  remove_alpha_ios: true
  android: "ic_launcher"
  adaptive_icon_background: "#08080A"
  adaptive_icon_foreground: "assets/branding/adaptive_foreground.png"
  ios: true
  web:
    generate: true
    background_color: "#08080A"
    theme_color: "#08080A"
  macos:
    generate: true
  windows:
    generate: true

# Launch/splash screen across every platform + Android 12+ (which ignores the
# legacy launch_background.xml and uses the system splash API). Obsidian bed with
# the padded brand ring centered. Regenerate with:
#   dart run flutter_native_splash:create
flutter_native_splash:
  color: "#08080A"
  image: "assets/branding/adaptive_foreground.png"
  android_12:
    color: "#08080A"
    image: "assets/branding/adaptive_foreground.png"
  web: false

flutter:
  # CocoaPods-only iOS build: Flutter's Swift Package Manager migration pulls
  # Firebase via SPM, which demands iOS >= 15 while this app targets 14.
  config:
    enable-swift-package-manager: false
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/branding/

  # Brand type stack — bundled (no runtime font fetch), shared with OrbVPN.
  # Display = Archivo · body/UI = IBM Plex Sans · labels/data = IBM Plex Mono.
  # RTL script families (future locales): Persian = Vazirmatn, Arabic = IBM
  # Plex Sans Arabic.
  fonts:
    - family: Archivo
      fonts:
        - asset: assets/fonts/Archivo-Variable.ttf
    - family: IBM Plex Sans
      fonts:
        - asset: assets/fonts/IBMPlexSans-Variable.ttf
    - family: IBM Plex Mono
      fonts:
        - asset: assets/fonts/IBMPlexMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/IBMPlexMono-Medium.ttf
          weight: 500
    - family: Vazirmatn
      fonts:
        - asset: assets/fonts/Vazirmatn-Variable.ttf
    - family: IBM Plex Sans Arabic
      fonts:
        - asset: assets/fonts/IBMPlexSansArabic-Regular.ttf
          weight: 400
        - asset: assets/fonts/IBMPlexSansArabic-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexSansArabic-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/IBMPlexSansArabic-Bold.ttf
          weight: 700