<?xml version="1.0"?>
<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="chromoRadial" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#f2fcd0"></stop>
      <stop offset="20%" stop-color="#e0f4b0"></stop>
      <stop offset="40%" stop-color="#c4e896"></stop>
      <stop offset="60%" stop-color="#a0d87c"></stop>
      <stop offset="80%" stop-color="#84c86c"></stop>
      <stop offset="100%" stop-color="#68b060"></stop>
    </radialGradient>
    <linearGradient id="luminance" x1="10%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.14"></stop>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0"></stop>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.12"></stop>
    </linearGradient>
    <mask id="ringMask">
      <circle cx="50" cy="50" r="29.3" fill="white"></circle>
      <circle cx="50" cy="50" r="15.1" fill="black"></circle>
    </mask>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="3" flood-color="#6a9858" flood-opacity="0.4"></feDropShadow>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <circle cx="50" cy="50" r="29.3" fill="url(#chromoRadial)" mask="url(#ringMask)"></circle>
  </g>
  <circle cx="50" cy="50" r="29.3" fill="url(#luminance)" mask="url(#ringMask)"></circle>
</svg>