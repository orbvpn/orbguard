app:
  name: orbguard-lab
  environment: development
  version: 1.0.0
  debug: true

server:
  host: 0.0.0.0
  http_port: 8090
  grpc_port: 9002
  read_timeout: 15s
  write_timeout: 15s
  idle_timeout: 60s
  shutdown_timeout: 30s

database:
  host: localhost
  port: 5432
  user: orbguard
  password: ""  # Set via ORBGUARD_DATABASE_PASSWORD env
  dbname: orbguard_lab
  sslmode: disable
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m
  schema: orbguard_lab

redis:
  host: localhost
  port: 6379
  password: ""  # Set via ORBGUARD_REDIS_PASSWORD env
  db: 1
  key_prefix: "orbguard:"

neo4j:
  enabled: true  # Enable Neo4j graph database for threat correlation
  uri: bolt://localhost:7687
  username: neo4j
  password: ""  # Set via ORBGUARD_NEO4J_PASSWORD env
  database: neo4j
  max_connections: 50
  max_lifetime_minutes: 60
  auto_sync: true            # Mirror Postgres → Neo4j so the threat graph stays populated (no manual /graph/sync needed)
  sync_interval_minutes: 720 # Full re-sync every 12h; first pass runs a couple minutes after boot, off the hot path

nats:
  url: nats://localhost:4222
  stream_name: ORBGUARD
  subjects:
    new_threat: "orbguard.threat.new"
    updated_threat: "orbguard.threat.updated"
    campaign_detected: "orbguard.campaign.detected"

jwt:
  secret: ""  # Set via ORBGUARD_JWT_SECRET env
  expiration: 24h
  issuer: orbguard-lab

cors:
  allowed_origins:
    - http://localhost:3000
    - http://localhost:8080
    - https://admin.orbai.world
    - https://api.orbai.world
    # OrbVPN admin/user web panel (orbnet.admin) — the anti-theft control UI
    # sends the OrbNet JWT to guard.orbai.world, so its origin must be allowed.
    - https://orbvpn.xyz
  allowed_methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
    - OPTIONS
  allowed_headers:
    - Accept
    - Authorization
    - Content-Type
    - X-Request-ID
  allow_credentials: true
  max_age: 3600

ratelimit:
  enabled: true
  requests_per_minute: 100
  requests_per_hour: 5000

logger:
  level: debug
  format: console
  time_format: "2006-01-02T15:04:05Z07:00"

aggregation:
  enabled: true
  initial_delay: 10s
  worker_pool_size: 5

sources:
  # Abuse.ch Suite
  urlhaus:
    enabled: true
    update_interval: 15m
    api_url: https://urlhaus-api.abuse.ch/v1

  threatfox:
    enabled: true
    update_interval: 15m
    api_url: https://threatfox-api.abuse.ch/api/v1

  malwarebazaar:
    enabled: true
    update_interval: 4h
    api_url: https://mb-api.abuse.ch/api/v1

  feodotracker:
    enabled: true
    update_interval: 1h
    api_url: https://feodotracker.abuse.ch/downloads

  sslblacklist:
    enabled: true
    update_interval: 24h
    api_url: https://sslbl.abuse.ch/blacklist

  # Phishing
  openphish:
    enabled: true
    update_interval: 4h
    feed_url: https://openphish.com/feed.txt

  phishtank:
    enabled: false  # DEPRECATED: PhishTank no longer accepts new registrations
    update_interval: 4h
    api_key: ""

  # Google Safe Browsing - PhishTank alternative (FREE with limits)
  google_safebrowsing:
    enabled: true
    update_interval: 30m
    api_key: ""  # Set via ORBGUARD_SOURCES_GOOGLE_SAFEBROWSING_API_KEY env
    api_url: https://safebrowsing.googleapis.com/v4

  # IP Reputation
  abuseipdb:
    enabled: true
    # Free tier allows only 5 blacklist requests/day — 6h = 4 requests/day
    # (the connector also enforces a 6h minimum regardless of this value)
    update_interval: 6h
    api_key: ""  # Set via ORBGUARD_SOURCES_ABUSEIPDB_API_KEY env

  greynoise:
    enabled: true
    update_interval: 1h
    api_key: ""  # Set via ORBGUARD_SOURCES_GREYNOISE_API_KEY env

  # Mobile/Spyware (HIGH PRIORITY)
  citizenlab:
    enabled: true
    update_interval: 6h
    github_urls:
      - https://raw.githubusercontent.com/citizenlab/malware-indicators/master/

  amnesty_mvt:
    enabled: true
    update_interval: 6h
    github_urls:
      - https://raw.githubusercontent.com/AmnestyTech/investigations/master/

  koodous:
    enabled: true
    # Koodous free-tier throttling locks the API for 8+ hours once exhausted;
    # 12h keeps us safely inside the quota
    update_interval: 12h
    api_key: ""  # Set via ORBGUARD_SOURCES_KOODOUS_API_KEY env

  # General
  alienvault_otx:
    enabled: true
    update_interval: 4h
    api_key: ""  # Set via ORBGUARD_SOURCES_ALIENVAULT_OTX_API_KEY env

  virustotal:
    enabled: true
    update_interval: 1h
    api_key: ""  # Set via ORBGUARD_SOURCES_VIRUSTOTAL_API_KEY env

scoring:
  weights:
    source_reliability: 0.30
    source_count: 0.25
    recency: 0.20
    report_count: 0.15
    source_confidence: 0.10

  bonuses:
    pegasus: 1.20      # 20% boost for Pegasus indicators
    cve_linked: 1.10   # 10% boost for CVE-linked
    known_family: 1.15 # 15% boost for known malware family

  source_reliability:
    citizen-lab: 0.95
    amnesty-tech: 0.95
    virustotal: 0.90
    threatfox: 0.85
    malwarebazaar: 0.85
    urlhaus: 0.80
    abuseipdb: 0.75
    community: 0.50

detection:
  yara:
    enabled: true
    rules_dir: ./rules

  behavioral:
    enabled: true
    baseline_duration: 24h

  supply_chain:
    enabled: true
    osv_api_url: https://api.osv.dev/v1

mitre:
  data_dir: ./data/mitre
  mobile_attack_file: mobile-attack.json
  enterprise_attack_file: enterprise-attack.json

stix:
  enabled: true
  taxii_server:
    enabled: true
    port: 8091

ml:
  anomaly_detection:
    enabled: true
    num_trees: 100
    sample_size: 256
    threshold: 0.5

  clustering:
    enabled: true
    min_samples: 5
    eps: 0.5

# Have I Been Pwned breach data (dark web monitoring)
hibp:
  enabled: true
  api_key: ""  # Set via ORBGUARD_HIBP_API_KEY env

# LeakCheck breach search (dark web monitoring)
leakcheck:
  enabled: true
  api_key: ""  # Set via ORBGUARD_LEAKCHECK_API_KEY env

# Intelligence X dark web search
intelx:
  enabled: true
  base_url: https://2.intelx.io
  api_key: ""  # Set via ORBGUARD_INTELX_API_KEY env

# Google Safe Browsing for live URL reputation lookups.
# Falls back to sources.google_safebrowsing.api_key when empty.
safe_browsing:
  api_key: ""  # Set via ORBGUARD_SAFE_BROWSING_API_KEY env

# AI-powered scam detection
scam_detector:
  enable_pattern_db: true   # local pattern database, no external dependency
  enable_phone_rep: true    # local phone reputation database
  enable_llm: true          # effective only when a Claude/OpenAI API key is set
  enable_vision: true       # requires an LLM API key
  enable_speech: true       # requires an OpenAI API key or an Azure OpenAI transcribe deployment
  llm_provider: claude      # claude, openai, deepseek or azure-openai
  llm_base_url: ""          # optional API base URL override (ORBGUARD_SCAM_DETECTOR_LLM_BASE_URL)
  llm_model: ""             # optional model override (ORBGUARD_SCAM_DETECTOR_LLM_MODEL)
  llm_reasoning_effort: "low"  # reasoning_effort for OpenAI/Azure reasoning models (ORBGUARD_SCAM_DETECTOR_LLM_REASONING_EFFORT); "" omits
  claude_api_key: ""        # Set via ORBGUARD_CLAUDE_API_KEY env
  openai_api_key: ""        # Set via ORBGUARD_OPENAI_API_KEY env
  deepseek_api_key: ""      # Set via ORBGUARD_DEEPSEEK_API_KEY env
  azure_openai_endpoint: "" # e.g. https://my-resource.openai.azure.com (ORBGUARD_AZURE_OPENAI_ENDPOINT)
  azure_openai_key: ""      # Set via ORBGUARD_AZURE_OPENAI_KEY env
  azure_openai_deployment: ""              # Set via ORBGUARD_AZURE_OPENAI_DEPLOYMENT env
  azure_openai_api_version: "2024-02-15-preview"  # ORBGUARD_AZURE_OPENAI_API_VERSION
  azure_openai_transcribe_deployment: ""   # audio transcription deployment, e.g. gpt-4o-transcribe (ORBGUARD_AZURE_OPENAI_TRANSCRIBE_DEPLOYMENT)
  scam_threshold: 0.7
  suspicious_threshold: 0.4

# DNS leak-check canary. zone is the controlled, NS-delegated domain served
# by the authoritative responder in cmd/dnscanary (e.g. dnscheck.example.com).
# When empty, POST /network/dns/check reports the leak check as explicitly
# unavailable instead of fabricating a result.
dns_canary:
  zone: ""  # Set via ORBGUARD_DNS_CANARY_ZONE env

# Firebase Cloud Messaging (FCM HTTP v1) push for real-time anti-theft command
# delivery. When enabled is false, or fcm_project_id / fcm_service_account_json
# is empty, push runs as an explicit no-op and remote commands are delivered by
# device polling instead. fcm_service_account_json accepts either the raw JSON
# content or a path to the service-account key file.
push:
  enabled: true
  fcm_project_id: ""           # Set via ORBGUARD_FCM_PROJECT_ID env
  fcm_service_account_json: "" # Set via ORBGUARD_FCM_SERVICE_ACCOUNT_JSON env (JSON content or file path)
