# Builds the OrbGuard Windows MSIX for Microsoft Partner Center.
#
# Flutter Windows builds REQUIRE a Windows host, so this runs on a
# windows-latest runner and publishes the .msix as a workflow artifact:
# download it from the run page and upload to Partner Center
# (Apps -> OrbGuard -> Packages).
#
# PREREQUISITE (one-time): reserve the app name in Partner Center, then copy
# Product identity values (Identity Name / Publisher / Publisher Display Name)
# into msix_config in app/pubspec.yaml — the placeholders there fail loudly
# until replaced. `--store` signs nothing locally; the Store signs on ingest.
name: Windows MSIX

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-msix:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.4
          channel: stable
          cache: true

      - name: Guard against placeholder identity
        shell: bash
        run: |
          if grep -q "REPLACE" pubspec.yaml; then
            echo "::error::msix_config still has Partner Center placeholders — fill identity_name/publisher/publisher_display_name from Partner Center Product identity first."
            exit 1
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package MSIX (store-signed)
        run: dart run msix:create --store

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: orbguard-windows-msix
          path: app/build/windows/x64/runner/Release/*.msix
          if-no-files-found: error
