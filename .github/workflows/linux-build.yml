# Builds OrbGuard for Linux on ubuntu-latest (Flutter Linux builds REQUIRE a
# Linux host) and produces three artifacts:
#  - tar.gz  (direct download)
#  - .deb    (direct download, Debian/Ubuntu)
#  - .snap   (unsigned local snap; publishing to the Snap Store additionally
#             needs `snapcraft login` credentials — see docs/DESKTOP_STORE_SUBMISSION.md)
name: Linux build (deb + tar.gz + snap)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  APP_VERSION: "1.0.0"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux desktop build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libsecret-1-dev libjsoncpp-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.4
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Build Linux release
        working-directory: app
        run: flutter build linux --release

      - name: Package tar.gz
        run: |
          cd app/build/linux/x64/release/bundle
          tar czf "$GITHUB_WORKSPACE/OrbGuard-${APP_VERSION}-linux-x64.tar.gz" .

      - name: Package .deb
        run: |
          set -e
          PKG=pkgroot
          mkdir -p $PKG/DEBIAN $PKG/opt/orbguard $PKG/usr/bin \
                   $PKG/usr/share/applications $PKG/usr/share/icons/hicolor/512x512/apps
          cp -r app/build/linux/x64/release/bundle/* $PKG/opt/orbguard/
          ln -s /opt/orbguard/orbguard $PKG/usr/bin/orbguard
          cp app/assets/branding/icon_master.png \
             $PKG/usr/share/icons/hicolor/512x512/apps/orbguard.png
          cat > $PKG/usr/share/applications/orbguard.desktop <<DESKTOP
          [Desktop Entry]
          Name=OrbGuard
          Comment=Know if you're being watched — anti-spyware & scam protection
          Exec=/opt/orbguard/orbguard
          Icon=orbguard
          Terminal=false
          Type=Application
          Categories=Utility;Security;
          DESKTOP
          cat > $PKG/DEBIAN/control <<CONTROL
          Package: orbguard
          Version: ${APP_VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Depends: libgtk-3-0, libsecret-1-0, libjsoncpp-dev | libjsoncpp25 | libjsoncpp26
          Maintainer: OrbVPN <support@orbvpn.com>
          Description: OrbGuard — anti-spyware, scam shield and anti-theft
           Know if you're being watched. Spyware checks, scam link/QR analysis,
           and device anti-theft, sharing one subscription with OrbVPN.
          CONTROL
          dpkg-deb --build --root-owner-group $PKG "orbguard_${APP_VERSION}_amd64.deb"

      - name: Build snap (unsigned)
        id: snap
        continue-on-error: true
        uses: snapcore/action-build@v1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orbguard-linux
          path: |
            OrbGuard-*.tar.gz
            orbguard_*_amd64.deb
            ${{ steps.snap.outputs.snap }}
          if-no-files-found: error
