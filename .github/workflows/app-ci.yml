name: App CI

on:
  push:
    branches:
      - main
      - production-hardening
    paths:
      - "app/**"
      # Backend route changes must re-run the API contract gate.
      - "backend/internal/api/**"
      - ".github/workflows/app-ci.yml"
  pull_request:
    paths:
      - "app/**"
      - "backend/internal/api/**"
      - ".github/workflows/app-ci.yml"

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # Pin to the Flutter version this project is developed against.
          # 3.44.x ships Dart >=3.12, required by in_app_purchase_android 0.5.x.
          flutter-version: 3.44.4
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Fail only on analyzer ERRORS. Infos/warnings (e.g. the pre-existing
      # dangling-doc-comment infos) must not break CI.
      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Test
        run: flutter test

      # API contract gate. tools/check_api_contract.py cross-checks the app's
      # endpoint calls against the backend chi router. In the monorepo both
      # sides are always present, so this gate always runs.
      - name: API contract gate
        run: python3 tools/check_api_contract.py --lab-root ../backend
